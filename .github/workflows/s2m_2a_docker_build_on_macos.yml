name: Build Docker Images on MacOS

on:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: macos-13

    steps:

      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 1

      - name: Copy .env.example to .env
        run: cp .env.example .env

      - name: Set up Docker
        uses: crazy-max/ghaction-setup-docker@v3
      
      - name: Install Docker Compose
        run: |
          mkdir -p ~/.docker/cli-plugins
          curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m) -o ~/.docker/cli-plugins/docker-compose
          chmod +x ~/.docker/cli-plugins/docker-compose
          docker compose version

      - name: Docker Build
        run: docker compose up --build --no-start

      - name: Docker Compose Up
        run: docker compose up -d
  
      - name: Ping
        run: |
          timeout=$(date -v+5M +%s)  # Calculate timeout duration (5 minutes from now)
          while true; do
            if curl -X POST -H "Content-Type: application/json" -d '{"jsonrpc":"2.0","method":"ping","params":[],"id":1}' http://0.0.0.0:4000/api > /dev/null; then
              echo "Service is up!"
              break
            else
              now=$(date +%s)
              if [[ $now -gt $timeout ]]; then
                echo "Timeout: Service did not become available within 5 minutes."
                exit 1  # Exit with error status
              else
                echo "Waiting for rpc server..."
                sleep 5
              fi
            fi
          done