name: Build Docker Images on MacOS

on:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: macos-13

    steps:

      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 1

      - name: Copy .env.example to .env
        run: cp .env.example .env

      - name: Set up Docker
        uses: crazy-max/ghaction-setup-docker@v3

      - name: Build Docker Images from Docker Directory
        run: |
          for image in $(ls docker/Dockerfile*); do
            docker build -f $image .
          done